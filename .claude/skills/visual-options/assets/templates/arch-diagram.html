<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }
      .page-header {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        padding: 16px 24px;
      }
      .page-header h1 {
        font-size: 18px;
        font-weight: 700;
      }
      .page-header p {
        font-size: 13px;
        color: #64748b;
        margin-top: 4px;
      }
      .diagram-wrapper {
        position: relative;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
        background: #f8fafc;
        margin: 20px;
      }
      .diagram-hint {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 12px;
        color: #94a3b8;
        pointer-events: none;
        z-index: 1;
      }
      .diagram-viewport {
        width: 100%;
        height: 500px;
        overflow: hidden;
        cursor: grab;
        position: relative;
      }
      .diagram-viewport svg {
        transition: transform 0.1s ease-out;
        transform-origin: 0 0;
      }
      .diagram-footer {
        padding: 16px 20px;
        background: white;
        border-top: 1px solid #e2e8f0;
        font-size: 13px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>{{TITLE}}</h1>
      <p>{{DESCRIPTION}}</p>
    </div>
    <div class="diagram-wrapper">
      <div class="diagram-hint">滚轮缩放 · 拖拽平移 · 双击放大</div>
      <div class="diagram-viewport">{{SVG_CONTENT}}</div>
    </div>
    <div class="diagram-footer">{{FOOTER_NOTES}}</div>
    <script>
      ;(function () {
        document.querySelectorAll('.diagram-viewport').forEach(function (vp) {
          var svg = vp.querySelector('svg')
          if (!svg) return
          var scale = 1,
            tx = 0,
            ty = 0
          var dragging = false,
            startX,
            startY
          function apply() {
            svg.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')'
          }
          vp.addEventListener(
            'wheel',
            function (e) {
              e.preventDefault()
              var rect = vp.getBoundingClientRect()
              var mx = e.clientX - rect.left
              var my = e.clientY - rect.top
              var oldScale = scale
              scale = Math.max(0.3, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1)))
              tx = mx - (mx - tx) * (scale / oldScale)
              ty = my - (my - ty) * (scale / oldScale)
              apply()
            },
            { passive: false }
          )
          vp.addEventListener('mousedown', function (e) {
            if (e.button !== 0) return
            dragging = true
            startX = e.clientX - tx
            startY = e.clientY - ty
            vp.style.cursor = 'grabbing'
            e.preventDefault()
          })
          document.addEventListener('mousemove', function (e) {
            if (!dragging) return
            tx = e.clientX - startX
            ty = e.clientY - startY
            svg.style.transition = 'none'
            apply()
          })
          document.addEventListener('mouseup', function () {
            if (dragging) {
              dragging = false
              vp.style.cursor = 'grab'
            }
          })
          vp.addEventListener('dblclick', function (e) {
            var rect = vp.getBoundingClientRect()
            var mx = e.clientX - rect.left
            var my = e.clientY - rect.top
            if (scale > 1.5) {
              scale = 1
              tx = 0
              ty = 0
            } else {
              var oldScale = scale
              scale = 2
              tx = mx - (mx - tx) * (scale / oldScale)
              ty = my - (my - ty) * (scale / oldScale)
            }
            apply()
          })
        })
      })()
    </script>
  </body>
</html>
