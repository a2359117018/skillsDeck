name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
          - os: windows-latest
            build_cmd: build:win
          - os: ubuntu-latest
            build_cmd: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Remove local npmrc mirrors
        run: rm -f .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/skilldeck-*-setup.exe
            dist/skilldeck-*.dmg
            dist/skilldeck-*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
