name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
          - os: windows-latest
            build_cmd: build:win
          - os: ubuntu-latest
            build_cmd: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run ${{ matrix.build_cmd }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        shell: bash
        run: |
          for f in dist/skilldeck-*-setup.exe dist/skilldeck-*.zip dist/skilldeck-*.dmg dist/skilldeck-*.AppImage; do
            [ -f "$f" ] && cosign sign-blob --yes --output-signature="${f}.sig" "$f"
          done
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/skilldeck-*-setup.exe
            dist/skilldeck-*.zip
            dist/skilldeck-*.dmg
            dist/skilldeck-*.AppImage
            dist/*.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
